services:
  pagemenot:
    image: us-central1-docker.pkg.dev/zipintel/pagemenot/pagemenot:latest
    build:
      context: .
      target: ${PAGEMENOT_BUILD_TARGET:-base}
    container_name: pagemenot
    restart: unless-stopped
    extra_hosts:
      - "metadata.google.internal:169.254.169.254"
    env_file: .env
    environment:
      - KNOWLEDGE_DIR=/app/knowledge
    ports:
      - "8080:8080"
    volumes:
      - ./knowledge/postmortems:/app/knowledge/postmortems
      - ./knowledge/runbooks:/app/knowledge/runbooks:ro
      - appdata:/app/data
      - chromadata:/app/data/chroma
      - chromacache:/root/.cache/chroma
      # Kubernetes kubeconfig (when not running as a pod):
      #   1. Place your kubeconfig at a path on the host
      #   2. Uncomment and update the line below; set KUBECONFIG_PATH=/app/kubeconfig in .env
      #   Local dev: run scripts/gen-kubeconfig.sh first (remaps 127.0.0.1 → host.docker.internal)
      # - /path/to/your/kubeconfig:/app/kubeconfig:ro
      # AWS credentials (for aws target): mount ~/.aws or use IAM role / env vars
      # - ~/.aws:/root/.aws:ro
      # GCP credentials (for gcp target): mount service account key or use Workload Identity
      # - /path/to/sa-key.json:/app/gcp-sa.json:ro   # then GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-sa.json
      # Azure credentials (for azure target): set AZURE_TENANT_ID/CLIENT_ID/CLIENT_SECRET in .env

volumes:
  appdata:
    external: true
  chromadata:
    external: true
  chromacache:
    external: true
