display_information:
  name: Pagemenot
  description: AI on-call copilot — triages alerts, posts root cause + fix to Slack
  background_color: "#1a1a2e"

features:
  slash_commands:
    - command: /pagemenot
      description: Triage an incident
      usage_hint: "triage <description>"
      should_escape: false
  bot_user:
    display_name: Pagemenot
    always_online: true
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - commands
      - groups:history

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
