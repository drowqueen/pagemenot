# Service → GitHub repo mapping for DiagnoserAgent deploy correlation.
#
# Hot-reloaded on change — no restart required.
# Without an entry, pagemenot falls back to: default_github_org/service-name
#
# default_github_org: myorg   # overrides GITHUB_ORG env var if set

services:
  # Repo name matches service name → no entry needed (zero config)

  # Repo name differs from service name:
  # payment-service:
  #   - repo: myorg/payments-gateway

  # Monorepo — filter PRs to files under path_prefix:
  # checkout-service:
  #   - repo: myorg/platform
  #     path_prefix: services/checkout/

  # Multiple repos:
  # api-gateway:
  #   - repo: myorg/api-gateway
  #   - repo: myorg/gateway-plugins

  # Monorepo + standalone repo combined:
  # notification-service:
  #   - repo: myorg/platform
  #     path_prefix: packages/notifications/
  #   - repo: myorg/notification-workers
